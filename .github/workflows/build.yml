name: Build MoustacheMod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: theos/theos:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          make clean
          make package
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MoustacheMod-Package
          path: packages/*.deb
