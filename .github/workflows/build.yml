name: Build MoustacheMod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential clang ldid
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos

      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export PATH=/home/runner/theos/bin:$PATH
          make clean
          make package
          
      - name: Upload .deb Package
        uses: actions/upload-artifact@v4
        with:
          name: MoustacheMod-Package
          path: packages/*.deb
