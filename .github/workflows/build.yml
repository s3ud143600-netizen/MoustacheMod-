name: Build MoustacheMod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential ldid libxml2 libxml2-dev

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos

      - name: Build Tweak
        env:
          THEOS: /home/runner/theos
        run: |
          export PATH=/home/runner/theos/bin:$PATH
          make clean
          make package
          
      - name: Upload .deb Package
        uses: actions/upload-artifact@v4
        with:
          name: MoustacheMod-Package
          path: packages/*.deb
